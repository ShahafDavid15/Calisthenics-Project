name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Run tests
        working-directory: backend
        run: npm test
        env:
          JWT_SECRET: test_secret_key
          DB_HOST: localhost
          DB_USER: root
          DB_PASSWORD: ""
          DB_NAME: calisthenics
          NODE_ENV: test
